<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧬 进化图鉴 - DIGIMON WORLD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: #e0e6ff;
            min-height: 100vh;
            padding: 24px;
        }

        .wrap { max-width: 1080px; margin: 0 auto; }

        header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 30px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
        }

        .home-link {
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #2a3a6a;
            border-radius: 6px;
            padding: 6px 12px;
            transition: background 0.2s, border-color 0.2s;
        }
        .home-link:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; }

        /* ---- 导航栏 (与主页一致) ---- */
        .main-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .nav-link {
            color: #8b95c7;
            text-decoration: none;
            font-size: 14px;
            padding: 7px 16px;
            border: 1px solid #2a3a6a;
            border-radius: 6px;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .nav-link:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; color: #e0e6ff; }
        .nav-link.active {
            color: #0a0e27;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border-color: transparent;
            font-weight: bold;
        }

        .intro {
            color: #8b95c7;
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        /* ---- 连接状态 ---- */
        .conn {
            font-size: 12px;
            color: #8b95c7;
            margin-bottom: 20px;
        }
        .conn .dot { color: #4ae87a; }
        .conn .dot.off { color: #ff5470; }

        /* ---- 进化链卡片 ---- */
        .chain {
            background: rgba(5, 8, 22, 0.5);
            border: 1px solid #2a3a6a;
            border-radius: 12px;
            padding: 20px 22px 24px;
            margin-bottom: 26px;
        }

        .chain-head {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .chain-head .cname {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .chain-head .cdesc {
            font-size: 12px;
            color: #8b95c7;
        }

        /* 每条链一个主题色 (按 element 着色) */
        .chain.fire    .cname { color: #ff9a3c; }
        .chain.ice     .cname { color: #4ae8c4; }
        .chain.bird    .cname { color: #ff8ac4; }
        .chain.thunder .cname { color: #ffd94a; }
        .chain.grass   .cname { color: #7ee87a; }
        .chain.water   .cname { color: #4aa8ff; }
        .chain.holy    .cname { color: #ffe89a; }
        .chain.light   .cname { color: #d4b0ff; }

        /* 描述 + 属性克制条 */
        .chain-desc {
            font-size: 13px;
            color: #b6bde8;
            line-height: 1.7;
            margin-bottom: 12px;
        }
        .matchup {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            margin-bottom: 18px;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid #2a3a6a;
            letter-spacing: 1px;
        }
        .badge.attr   { color: #00d4ff; border-color: rgba(0, 212, 255, 0.5); }
        .badge.strong { color: #4ae87a; border-color: rgba(74, 232, 122, 0.5); }
        .badge.weak   { color: #ff8a8a; border-color: rgba(255, 138, 138, 0.5); }
        .badge.crest  { color: #ffd700; border-color: rgba(255, 215, 0, 0.5); }
        .matchup .note {
            color: #6b74a0;
            align-self: center;
        }

        .stages {
            display: flex;
            align-items: stretch;
            gap: 0;
            flex-wrap: wrap;
        }

        .stage {
            flex: 1 1 180px;
            min-width: 160px;
            background: rgba(42, 58, 106, 0.28);
            border: 1px solid #2a3a6a;
            border-radius: 10px;
            padding: 16px 14px;
            text-align: center;
            transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
        }
        .stage:hover {
            transform: translateY(-4px);
            border-color: #00d4ff;
            box-shadow: 0 8px 22px rgba(0, 212, 255, 0.15);
        }

        .stage .emoji {
            font-size: 46px;
            line-height: 1;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(124, 58, 237, 0.4));
        }
        .stage .sname {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .stage .en {
            font-size: 11px;
            color: #6b74a0;
            font-family: "SF Mono", "Consolas", monospace;
            margin-bottom: 6px;
        }
        .stage .tier {
            display: inline-block;
            font-size: 10px;
            letter-spacing: 1px;
            color: #b98aff;
            border: 1px solid rgba(124, 58, 237, 0.5);
            border-radius: 4px;
            padding: 2px 8px;
            margin-bottom: 10px;
        }
        .stage .skills {
            list-style: none;
            font-size: 12px;
            color: #c3cbf0;
            line-height: 1.8;
        }
        .stage .skills li::before {
            content: "⚡ ";
            color: #ffd700;
        }

        /* 进化箭头 */
        .arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 34px;
            color: #7c3aed;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(124, 58, 237, 0.7);
            user-select: none;
        }
        @media (max-width: 620px) {
            .arrow { flex-basis: 100%; padding: 4px 0; transform: rotate(90deg); }
        }

        .state-msg {
            text-align: center;
            color: #8b95c7;
            font-size: 14px;
            padding: 40px 0;
        }
        .state-msg.error { color: #ff8a8a; }

        footer {
            text-align: center;
            margin-top: 24px;
            color: #555f8a;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <header>
            <h1>🧬 进化图鉴</h1>
            <a class="home-link" href="index.html">← 返回世界</a>
        </header>

        <nav class="main-nav" aria-label="主导航">
            <a href="index.html" class="nav-link">主页</a>
            <a href="battle.html" class="nav-link">战斗模拟</a>
            <a href="evolution.html" class="nav-link active">进化图鉴</a>
            <a href="log.html" class="nav-link">世界日志</a>
            <a href="admin.html" class="nav-link">管理</a>
        </nav>

        <p class="intro">
            数码兽通过战斗胜利与羁绊累积逐阶进化。图鉴数据来自后端 API,
            每条进化线标注了属性克制、纹章象征与各阶段代表招式。
        </p>

        <div class="conn" id="conn">加载中…</div>

        <div id="pokedex">
            <div class="state-msg">正在从图鉴 API 拉取数据…</div>
        </div>

        <footer>DIGIMON WORLD · Phase 5 · 进化图鉴 · 数据源: /api/pokedex</footer>
    </div>

    <script>
        // API_BASE: 与 main.js / battle.html / log.html 一致
        const API_BASE = (() => {
            if (typeof window.API_BASE === 'string') return window.API_BASE;
            if (window.location.origin.includes('workers.dev')) return '';
            return 'http://localhost:8000';
        })();

        // 属性中文名
        const ATTR_CN = {
            vaccine: '疫苗种', data: '数据种', virus: '病毒种', free: '自由种',
        };

        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
                ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function setConn(ok, text) {
            const el = document.getElementById('conn');
            el.innerHTML = ok
                ? `${esc(text)} <span class="dot">●</span>`
                : `${esc(text)} <span class="dot off">●</span>`;
        }

        function attrCn(a) { return ATTR_CN[a] || a || '—'; }

        // 渲染一条进化链
        function renderChain(entry) {
            const stagesHtml = entry.evolution_chain.map((form, i) => {
                const skills = (form.skills || [])
                    .map(s => `<li>${esc(s)}</li>`).join('');
                const stage = `
                    <div class="stage">
                        <span class="emoji">${esc(form.emoji)}</span>
                        <div class="sname">${esc(form.name)}</div>
                        <div class="en">${esc(form.en)}</div>
                        <div class="tier">${esc(form.tier)} ${esc((form.stage || '').toUpperCase())}</div>
                        <ul class="skills">${skills}</ul>
                    </div>`;
                const arrow = i < entry.evolution_chain.length - 1
                    ? '<div class="arrow">➜</div>' : '';
                return stage + arrow;
            }).join('');

            const tm = entry.type_matchup || {};
            const matchupHtml = `
                <div class="matchup">
                    <span class="badge crest">🏅 ${esc(entry.crest)}</span>
                    <span class="badge attr">属性 · ${esc(attrCn(tm.attribute || entry.attribute))}</span>
                    ${tm.strong_against
                        ? `<span class="badge strong">克制 · ${esc(attrCn(tm.strong_against))} ×1.5</span>` : ''}
                    ${tm.weak_against
                        ? `<span class="badge weak">被克 · ${esc(attrCn(tm.weak_against))}</span>` : ''}
                    ${tm.note ? `<span class="note">${esc(tm.note)}</span>` : ''}
                </div>`;

            const rookie = entry.evolution_chain[0] || {};
            return `
                <section class="chain ${esc(entry.element)}">
                    <div class="chain-head">
                        <span class="cname">${esc(rookie.emoji)} ${esc(entry.name)} 进化线</span>
                        <span class="cdesc">${esc(entry.element)} 系 · ${esc(entry.crest)}的象征</span>
                    </div>
                    <div class="chain-desc">${esc(entry.description)}</div>
                    ${matchupHtml}
                    <div class="stages">${stagesHtml}</div>
                </section>`;
        }

        async function load() {
            const container = document.getElementById('pokedex');
            try {
                // 1. 拉列表拿到所有 species
                const listRes = await fetch(`${API_BASE}/api/pokedex`);
                if (!listRes.ok) throw new Error(`列表 ${listRes.status}`);
                const list = await listRes.json();
                const entries = list.entries || [];

                // 2. 并发拉每条完整详情 (含进化链 + 属性克制)
                const details = await Promise.all(
                    entries.map(e =>
                        fetch(`${API_BASE}/api/pokedex/${encodeURIComponent(e.species)}`)
                            .then(r => r.ok ? r.json() : null)
                            .catch(() => null)
                    )
                );

                const valid = details.filter(Boolean);
                if (!valid.length) {
                    container.innerHTML =
                        '<div class="state-msg error">图鉴为空,后端未返回数据。</div>';
                    setConn(false, '无数据');
                    return;
                }

                container.innerHTML = valid.map(renderChain).join('');
                setConn(true, `已连接 · ${valid.length} 条进化线`);
            } catch (err) {
                container.innerHTML =
                    `<div class="state-msg error">无法连接图鉴 API (${esc(err.message)})。<br>
                     请确认后端已在 ${esc(API_BASE || '当前源')} 启动。</div>`;
                setConn(false, '离线');
            }
        }

        load();
    </script>
</body>
</html>
