<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🖥️ 管理后台 - DIGIMON WORLD</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved === 'light' || saved === 'dark') {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>
    <style>
        /* ---- 管理后台专属样式 ---- */
        #app { max-width: 1200px; }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 14px;
            color: var(--accent-cyan);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .panel h2 .icon { font-size: 20px; }

        .status-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }

        .status-pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .status-pill.on { color: var(--positive); border-color: var(--positive); }
        .status-pill.off { color: var(--negative); border-color: var(--negative); }

        .btn-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface-light);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--accent-purple); border-color: var(--accent-purple); color: #fff; }
        .btn.danger:hover { background: var(--negative); border-color: var(--negative); }
        .btn.primary { background: var(--accent-purple); border-color: var(--accent-purple); color: #fff; }
        .btn.small { padding: 4px 10px; font-size: 12px; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }
        .data-table th, .data-table td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .data-table th {
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-table tr:hover td { background: var(--surface-light); }

        .world-row { cursor: pointer; }
        .world-row:hover td { background: var(--surface-light); }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge.evo { background: rgba(124, 58, 237, 0.2); color: var(--accent-purple); }
        .badge.attribute { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); }
        .badge.danger { background: rgba(255, 92, 92, 0.15); color: var(--negative); }
        .badge.ok { background: rgba(74, 232, 196, 0.15); color: var(--positive); }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 14px;
            z-index: 9999;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .toast.success { border-color: var(--positive); }
        .toast.error { border-color: var(--negative); }

        @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(30px); } }

        .section-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent-cyan);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .nav-bar {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .nav-bar a {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .nav-bar a:hover, .nav-bar a.active {
            color: var(--accent-cyan);
            border-color: var(--border);
            background: var(--surface-light);
        }
    </style>
</head>
<body>
<div id="app">
    <header>
        <h1>🖥️ DIGIMON WORLD</h1>
        <p style="color: var(--text-secondary); font-size: 14px; letter-spacing: 1px;">管理后台 · Phase 13</p>
        <div class="meta-bar">
            <span id="metaTick">⏱ --</span>
            <span id="metaTime">🕐 --</span>
            <span id="metaAgents">🐾 -- agents</span>
            <span id="metaWorlds">🌌 -- worlds</span>
        </div>
    </header>

    <div class="nav-bar">
        <a href="index.html">🏠 主页</a>
        <a href="log.html">📜 世界日志</a>
        <a href="stats.html">📊 仪表盘</a>
        <a href="battle.html">⚔️ 战斗</a>
        <a href="evolution.html">🧬 进化图鉴</a>
        <a href="admin.html" class="active">🖥️ 管理</a>
    </div>

    <div class="admin-grid">
        <!-- Panel 1: System Overview -->
        <div class="panel" style="grid-column: 1 / -1;">
            <h2><span class="icon">⚙️</span>System Overview</h2>
            <div class="status-bar" id="systemStatus">
                <span class="status-pill off">🔄 加载中...</span>
            </div>
            <div class="btn-row">
                <button class="btn" onclick="action('save')">💾 Save World</button>
                <button class="btn" onclick="action('load')">📥 Load World</button>
                <button class="btn primary" onclick="action('snapshot')">📸 Create Snapshot</button>
                <button class="btn" onclick="action('restore')">🔄 Restore Latest</button>
            </div>
            <div class="btn-row" style="margin-top:8px;">
                <span style="font-size:12px;color:var(--text-secondary);margin-right:8px;line-height:32px;">Speed:</span>
                <button class="btn small" onclick="setSpeed(1)">1×</button>
                <button class="btn small" onclick="setSpeed(5)">5×</button>
                <button class="btn small" onclick="setSpeed(10)">10×</button>
                <button class="btn small" onclick="setSpeed(60)">60×</button>
                <span id="speedLabel" style="font-size:12px;color:var(--text-muted);line-height:32px;margin-left:8px;"></span>
            </div>
        </div>

        <!-- Panel 2: Multiverse -->
        <div class="panel">
            <h2><span class="icon">🌌</span>Multiverse</h2>
            <div class="input-group">
                <input type="text" id="newWorldName" placeholder="新世界 ID (留空自动生成)">
                <button class="btn primary small" onclick="createWorld()">+ Create</button>
            </div>
            <div id="worldList"><span class="spinner"></span> Loading...</div>
        </div>

        <!-- Panel 3: Agents -->
        <div class="panel">
            <h2><span class="icon">🐾</span>Agents</h2>
            <div id="agentList"><span class="spinner"></span> Loading...</div>
        </div>

        <!-- Panel 4: Dark Gears -->
        <div class="panel">
            <h2><span class="icon">⚙️</span>Dark Gears</h2>
            <div id="gearStatus"><span class="spinner"></span> Loading...</div>
        </div>

        <!-- Panel 5: Recent Snapshots -->
        <div class="panel">
            <h2><span class="icon">📸</span>Snapshots</h2>
            <div id="snapshotList"><span class="spinner"></span> Loading...</div>
        </div>

        <!-- Panel 6: Chosen Children -->
        <div class="panel">
            <h2><span class="icon">👧</span>Chosen Children</h2>
            <div id="childrenList"><span class="spinner"></span> Loading...</div>
        </div>
    </div>
</div>

<script>
    const API_BASE = '/api';

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function toast(msg, type) {
        var t = document.createElement('div');
        t.className = 'toast ' + (type || '');
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(function() { t.remove(); }, 3000);
    }

    async function fetchJSON(path, opts) {
        var res = await fetch(API_BASE + path, opts || {});
        if (!res.ok) throw new Error('HTTP ' + res.status + ' @ ' + path);
        return res.json();
    }

    // ---- System Overview ----
    async function loadSystem() {
        try {
            var [status, state] = await Promise.all([
                fetchJSON('/scheduler/status'),
                fetchJSON('/director/state'),
            ]);
            var el = document.getElementById('systemStatus');
            var r = status.running;
            el.innerHTML =
                '<span class="status-pill ' + (r ? 'on' : 'off') + '">' +
                (r ? '✅ Running' : '⏸ Paused') + '</span>' +
                '<span class="status-pill">Tick: ' + (status.tick_count || 0) + '</span>' +
                '<span class="status-pill">🕐 ' + (status.current_world_time || 'N/A') + '</span>' +
                '<span class="status-pill">⚡ ' + (state.ratio || '?') + '× speed</span>';

            document.getElementById('metaTick').textContent = '⏱ tick#' + (status.tick_count || 0);
            document.getElementById('metaTime').textContent = '🕐 ' + (status.current_world_time || 'N/A');
            document.getElementById('speedLabel').textContent = 'current: ' + (state.ratio || '?') + '×';
        } catch (e) {
            document.getElementById('systemStatus').innerHTML =
                '<span class="status-pill off">❌ Backend unreachable</span>';
        }
    }

    // ---- Multiverse ----
    async function loadMultiverse() {
        try {
            var data = await fetchJSON('/multiverse');
            var worlds = data.worlds || [];
            var el = document.getElementById('worldList');
            document.getElementById('metaWorlds').textContent = '🌌 ' + worlds.length + ' worlds';

            if (!worlds.length) { el.innerHTML = '<p style="color:var(--text-muted);">No worlds</p>'; return; }

            var html = '<table class="data-table"><thead><tr><th>ID</th><th>Agents</th><th>Events</th><th>Seasons</th><th>Actions</th></tr></thead><tbody>';
            worlds.forEach(function(w) {
                html += '<tr class="world-row">' +
                    '<td><strong>' + esc(w.world_id) + '</strong>' +
                    (w.world_id === 'prime' ? ' <span class="badge ok">prime</span>' : '') + '</td>' +
                    '<td>' + (w.agent_count || 0) + '</td>' +
                    '<td>' + (w.event_count || 0) + '</td>' +
                    '<td>' + (w.seasons_enabled ? '✅' : '❌') + '</td>' +
                    '<td>' +
                    (w.world_id !== 'prime'
                        ? '<button class="btn small danger" onclick="deleteWorld(\'' + esc(w.world_id) + '\')">🗑</button> '
                        : '') +
                    '<button class="btn small" onclick="seedWorld(\'' + esc(w.world_id) + '\')">🌱</button>' +
                    '</td></tr>';
            });
            html += '</tbody></table>';
            el.innerHTML = html;
        } catch (e) {
            document.getElementById('worldList').innerHTML = '<p style="color:var(--negative);">Failed to load</p>';
        }
    }

    async function createWorld() {
        var name = document.getElementById('newWorldName').value.trim();
        try {
            var data = await fetchJSON('/multiverse/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ world_id: name || null, seasons: true, seed_digimon: false }),
            });
            toast('World created: ' + data.world_id, 'success');
            document.getElementById('newWorldName').value = '';
            loadMultiverse();
        } catch (e) { toast('Create failed: ' + e.message, 'error'); }
    }

    async function deleteWorld(id) {
        if (!confirm('Delete world "' + id + '"? This cannot be undone.')) return;
        try {
            await fetchJSON('/multiverse/' + id, { method: 'DELETE' });
            toast('World deleted: ' + id, 'success');
            loadMultiverse();
        } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
    }

    async function seedWorld(id) {
        try {
            var data = await fetchJSON('/multiverse/' + id + '/seed', { method: 'POST' });
            toast('Seeded ' + data.added + ' digimon into ' + id, 'success');
            loadMultiverse();
            loadAgents();
        } catch (e) { toast('Seed failed: ' + e.message, 'error'); }
    }

    // ---- Agents ----
    async function loadAgents() {
        try {
            var data = await fetchJSON('/digimon');
            document.getElementById('metaAgents').textContent = '🐾 ' + (data.count || 0) + ' agents';
            var agents = data.digimon || [];
            var el = document.getElementById('agentList');
            if (!agents.length) { el.innerHTML = '<p style="color:var(--text-muted);">No agents</p>'; return; }

            var html = '<table class="data-table"><thead><tr><th>Name</th><th>Stage</th><th>Type</th><th>Plan</th></tr></thead><tbody>';
            agents.forEach(function(a) {
                html += '<tr>' +
                    '<td><strong>' + esc(a.name) + '</strong></td>' +
                    '<td><span class="badge evo">' + esc(a.stage) + '</span></td>' +
                    '<td><span class="badge attribute">' + esc(a.attribute) + '</span></td>' +
                    '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(a.current_plan || '') + '">' +
                    esc(a.current_plan || 'idle') + '</td></tr>';
            });
            html += '</tbody></table>';
            el.innerHTML = html;
        } catch (e) {
            document.getElementById('agentList').innerHTML = '<p style="color:var(--negative);">Failed to load</p>';
        }
    }

    // ---- Dark Gears ----
    async function loadGears() {
        try {
            var data = await fetchJSON('/dark-gears');
            var gears = data.active_gears || [];
            var infected = data.infected_sub_regions || [];
            var el = document.getElementById('gearStatus');

            var html = '<div class="section-label">Active Gears: ' + gears.length + '</div>';
            if (!gears.length) {
                html += '<p style="color:var(--positive);">✅ No active dark gears</p>';
            } else {
                html += '<table class="data-table"><thead><tr><th>Gear ID</th><th>Type</th><th>Region</th><th>HP</th></tr></thead><tbody>';
                gears.forEach(function(g) {
                    html += '<tr><td>' + esc(g.gear_id || '?') + '</td>' +
                        '<td><span class="badge danger">' + esc(g.type || 'standard') + '</span></td>' +
                        '<td>' + esc(g.sub_region_id || '?') + '</td>' +
                        '<td>' + (g.hp || '?') + '</td></tr>';
                });
                html += '</tbody></table>';
            }
            html += '<div class="section-label" style="margin-top:10px;">Infected Regions: ' + infected.length + '</div>';
            if (infected.length) {
                html += '<p style="font-size:12px;color:var(--negative);">' + infected.map(esc).join(', ') + '</p>';
            }
            el.innerHTML = html;
        } catch (e) {
            document.getElementById('gearStatus').innerHTML = '<p style="color:var(--text-muted);">Gear system not available</p>';
        }
    }

    // ---- Snapshots ----
    async function loadSnapshots() {
        try {
            var data = await fetchJSON('/snapshots');
            var snaps = data.snapshots || [];
            var el = document.getElementById('snapshotList');
            if (!snaps.length) { el.innerHTML = '<p style="color:var(--text-muted);">No snapshots yet</p>'; return; }

            var html = '<table class="data-table"><thead><tr><th>ID</th><th>Tick</th><th>Agents</th><th>Note</th><th>Restore</th></tr></thead><tbody>';
            snaps.forEach(function(s) {
                html += '<tr><td style="font-family:monospace;font-size:11px;">' + esc(s.snapshot_id || '').substring(0, 12) + '...</td>' +
                    '<td>#' + (s.world_tick || 0) + '</td>' +
                    '<td>' + (s.digimon_count || 0) + '</td>' +
                    '<td>' + esc(s.note || '-') + '</td>' +
                    '<td><button class="btn small" onclick="restoreSnapshot(\'' + esc(s.snapshot_id) + '\')">↩</button></td></tr>';
            });
            html += '</tbody></table>';
            el.innerHTML = html;
        } catch (e) {
            document.getElementById('snapshotList').innerHTML = '<p style="color:var(--text-muted);">No snapshots</p>';
        }
    }

    async function restoreSnapshot(id) {
        if (!confirm('Restore snapshot ' + id + '? This will rollback world state.')) return;
        try {
            var data = await fetchJSON('/snapshots/' + id + '/restore', { method: 'POST' });
            toast('Restored: ' + data.digimon_count + ' digimon', 'success');
            loadAll();
        } catch (e) { toast('Restore failed: ' + e.message, 'error'); }
    }

    // ---- Chosen Children ----
    async function loadChildren() {
        try {
            var data = await fetchJSON('/chosen-children');
            var el = document.getElementById('childrenList');
            if (!data.count) { el.innerHTML = '<p style="color:var(--text-muted);">No chosen children</p>'; return; }
            var children = data.children || [];
            var html = '<table class="data-table"><thead><tr><th>Name</th><th>Crest</th><th>Partner</th><th>Bond</th></tr></thead><tbody>';
            children.forEach(function(c) {
                html += '<tr><td><strong>' + esc(c.name) + '</strong></td>' +
                    '<td>' + esc(c.crest || '?') + '</td>' +
                    '<td>' + esc(c.partner_name || 'none') + '</td>' +
                    '<td>' + (c.bond || 0) + '</td></tr>';
            });
            html += '</tbody></table>';
            el.innerHTML = html;
        } catch (e) {
            document.getElementById('childrenList').innerHTML = '<p style="color:var(--text-muted);">Not available</p>';
        }
    }

    // ---- Actions ----
    async function action(cmd) {
        try {
            var data;
            switch (cmd) {
                case 'save':
                    data = await fetchJSON('/world/save', { method: 'POST' });
                    toast('World saved (' + data.digimon_count + ' digimon)', 'success');
                    break;
                case 'load':
                    data = await fetchJSON('/world/load', { method: 'POST' });
                    toast(data.status === 'loaded' ? 'Loaded ' + data.digimon_count + ' digimon' : 'No saved data', data.status === 'loaded' ? 'success' : '');
                    loadAll();
                    break;
                case 'snapshot':
                    data = await fetchJSON('/snapshots', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ note: 'Admin manual snapshot' }),
                    });
                    toast('Snapshot ' + data.snapshot_id, 'success');
                    loadSnapshots();
                    break;
                case 'restore':
                    var snaps = await fetchJSON('/snapshots');
                    if (!snaps.snapshots || !snaps.snapshots.length) {
                        toast('No snapshots to restore', 'error');
                        return;
                    }
                    restoreSnapshot(snaps.snapshots[0].snapshot_id);
                    break;
            }
        } catch (e) { toast(cmd + ' failed: ' + e.message, 'error'); }
    }

    async function setSpeed(ratio) {
        try {
            var data = await fetchJSON('/director/speed', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ratio: ratio }),
            });
            toast('Speed: ' + data.old_ratio + '× → ' + data.new_ratio + '×', 'success');
            document.getElementById('speedLabel').textContent = 'current: ' + data.new_ratio + '×';
        } catch (e) { toast('Speed change failed: ' + e.message, 'error'); }
    }

    async function loadAll() {
        await Promise.allSettled([
            loadSystem(),
            loadMultiverse(),
            loadAgents(),
            loadGears(),
            loadSnapshots(),
            loadChildren(),
        ]);
    }

    loadAll();
    setInterval(loadAll, 15000);
</script>
</body>
</html>
