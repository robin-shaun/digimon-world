<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐉 DIGIMON WORLD - 星航开发中</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // 早于渲染设置主题, 避免闪烁 (默认 dark)
        (function () {
            var saved = localStorage.getItem('theme');
            if (saved === 'light' || saved === 'dark') {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();
    </script>
</head>
<body>
    <!-- 全屏Canvas世界地图 -->
    <canvas id="world-map"></canvas>

    <!-- 顶部半透明悬浮导航条 -->
    <div id="top-nav" class="top-nav">
        <h1 class="nav-title">🐉 DIGIMON WORLD</h1>
        <nav class="nav-links">
            <a href="index.html" class="nav-link active">主页</a>
            <a href="battle.html" class="nav-link">战斗</a>
            <a href="evolution.html" class="nav-link">进化</a>
            <a href="log.html" class="nav-link">日志</a>
            <a href="admin.html" class="nav-link">管理</a>
        </nav>
        <button id="theme-toggle" class="theme-btn" aria-label="切换主题">🌙</button>
    </div>

    <!-- 底部半透明状态栏 -->
    <div id="status-bar" class="status-bar">
        <span id="world-time">世界时间: --</span>
        <span id="digimon-count">数码兽: 0</span>
        <span id="battle-count">战斗: 0</span>
        <span id="vitality-score" title="世界活力指数">活力: --</span>
        <span id="phase">Phase: --</span>
    </div>

    <!-- 右侧滑出侧栏 -->
    <aside id="sidebar" class="sidebar">
        <p class="hint">点击数码兽 或 方向键+Enter 查看详情</p>
    </aside>

    <!-- 世界叙事面板 -->
    <div id="narrative-panel" class="narrative-panel">
        <h3>📖 世界叙事</h3>
        <div id="narrative-content">
            <div class="narrative-title">世界故事正在酝酿中…</div>
            <div class="narrative-story"></div>
            <div class="narrative-meta"></div>
        </div>
    </div>

    <!-- 导演面板 -->
    <aside id="director-panel" class="director-panel" aria-label="导演面板">
        <h2>🎬 导演面板</h2>
        <section class="dir-section">
            <h3>关系图</h3>
            <canvas id="relationship-graph" width="184" height="184"></canvas>
            <p class="dir-hint" id="rel-hint">加载关系中…</p>
        </section>
        <section class="dir-section">
            <h3>派系</h3>
            <ul id="faction-list" class="faction-list">
                <li class="dir-hint">暂无派系</li>
            </ul>
        </section>
        <section class="dir-section">
            <h3>排行榜</h3>
            <div class="lb-tabs" role="tablist">
                <button class="lb-tab active" data-lb="battle" role="tab">⚔️ 战斗</button>
                <button class="lb-tab" data-lb="bond" role="tab">💗 羁绊</button>
                <button class="lb-tab" data-lb="badges" role="tab">🏅 徽章</button>
            </div>
            <ol id="leaderboard-list" class="leaderboard-list">
                <li class="dir-hint">加载排行榜中…</li>
            </ol>
        </section>
        <section class="dir-section">
            <h3>🌍 共享文化</h3>
            <ul id="culture-list" class="culture-list">
                <li class="dir-hint">加载中…</li>
            </ul>
        </section>
        <section class="dir-section">
            <h3>⚡ 能量经济</h3>
            <div id="economy-stats"><p class="dir-hint">加载中…</p></div>
            <div class="econ-subhead">📋 最近转移</div>
            <ul id="economy-transfers" class="econ-transfer-list">
                <li class="dir-hint">加载中…</li>
            </ul>
            <div class="econ-subhead">🤝 利他排行</div>
            <div id="economy-altruism">
                <p class="dir-hint">加载中…</p>
            </div>
        </section>
        <section class="dir-section">
            <h3>最近事件</h3>
            <ul id="director-events" class="event-list">
                <li class="dir-hint">暂无事件</li>
            </ul>
        </section>
        <section class="dir-section">
            <h3>时间流速</h3>
            <div class="speed-btns">
                <button class="speed-btn" data-ratio="1">1x</button>
                <button class="speed-btn" data-ratio="5">5x</button>
                <button class="speed-btn" data-ratio="60">60x</button>
            </div>
            <p class="dir-hint" id="speed-status">当前: --</p>
        </section>
        <section class="dir-section">
            <h3>注入事件</h3>
            <select id="inject-type" class="inject-type">
                <option value="director_event">通用事件</option>
                <option value="weather">天气</option>
                <option value="disaster">灾害</option>
                <option value="faction_create">创建派系</option>
                <option value="encounter">遭遇</option>
                <option value="evolution_event">进化事件</option>
                <option value="festival">节日事件</option>
                <option value="battle_event">遭遇战斗</option>
            </select>
            <input type="text" id="inject-input" class="inject-input"
                   placeholder="事件描述…" maxlength="120">
            <button id="inject-btn" class="inject-btn">注入事件</button>
            <p class="dir-hint" id="inject-status"></p>
        </section>
        <section class="dir-section">
            <h3>📋 事件历史</h3>
            <div id="event-history-list" class="event-history-list">
                <p class="dir-hint">加载中…</p>
            </div>
        </section>
        <section class="dir-section">
            <h3>存档</h3>
            <div class="save-btns">
                <button id="save-btn" class="save-btn">💾 保存</button>
                <button id="load-btn" class="save-btn">📂 加载</button>
            </div>
            <p class="dir-hint" id="save-status"></p>
        </section>
        <p class="dir-hint" id="director-conn"></p>
    </aside>

    <script>
        // 主题切换 (全屏版)
        (function () {
            var root = document.documentElement;
            var btn = document.getElementById('theme-toggle');
            function currentTheme() {
                return root.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
            }
            function syncIcon() {
                btn.textContent = currentTheme() === 'light' ? '🌙' : '☀️';
            }
            syncIcon();
            btn.addEventListener('click', function () {
                var next = currentTheme() === 'light' ? 'dark' : 'light';
                root.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                syncIcon();
            });
        })();
    </script>
    <script src="audio.js"></script>
    <script src="sprites.js"></script>
    <script src="animator.js"></script>
    <script src="tts.js"></script>
    <script src="particles.js"></script>
    <script src="culture.js"></script>
    <script src="economy.js"></script>
    <script src="main.js"></script>
</body>
</html>
