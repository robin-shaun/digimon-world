<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐉 DIGIMON WORLD - 星航开发中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🐉 DIGIMON WORLD</h1>
            <p class="subtitle">数码宝贝虚拟世界 · 星航开发中 · Phase 1</p>
        </header>

        <main>
            <div class="canvas-wrap">
                <canvas id="world-map" width="960" height="600"></canvas>
                <aside id="sidebar" class="sidebar">
                    <p class="hint">点击地图上的数码兽查看详情</p>
                </aside>
            </div>
            <div id="status-bar">
                <span id="world-time">世界时间: --</span>
                <span id="digimon-count">数码兽: 0</span>
                <span id="phase">Phase: --</span>
            </div>
        </main>

        <footer>
            <p>参考 Stanford Generative Agents + 数码宝贝动画 · 仓库 gitee.com/robin_shaun/digimon-world</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
