<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐉 DIGIMON WORLD - 星航开发中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🐉 DIGIMON WORLD</h1>
            <p class="subtitle">数码宝贝虚拟世界 · 星航开发中</p>
        </header>

        <main>
            <canvas id="world-map" width="960" height="600"></canvas>
            <div id="status-bar">
                <span id="world-time">世界时间: --</span>
                <span id="digimon-count">数码兽: 0</span>
                <span id="phase">Phase: 0 (骨架)</span>
            </div>
        </main>

        <footer>
            <p>参考 Stanford Generative Agents + 数码宝贝动画 · 仓库 gitee.com/robin_shaun/digimon-world</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
